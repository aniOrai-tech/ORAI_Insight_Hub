<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORAI Insight Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/js/ai-agent-widget.js"></script>
   <link rel="stylesheet" href="/css/style.css" />
   <link rel="stylesheet" href="/css/enterprise.css" />
   <script src="/themes/darkTheme.js"></script>
   <script src="/themes/lightTheme.js"></script>
   <script src="/themes/whiteTheme.js"></script>

</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════ LOGIN PAGE -->
  <div id="login-page" class="page active">
    <div class="login-bg">
      <div class="login-orb orb-1"></div>
      <div class="login-orb orb-2"></div>
      <div class="login-orb orb-3"></div>
      <div class="login-grid"></div>
    </div>
    <div class="login-container">
      <div class="login-brand">
        <div class="brand-icon">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <rect width="36" height="36" rx="10" fill="url(#brandGrad)"/>
            <path d="M10 18L16 12L22 18L28 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 24L16 18L22 24L28 18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
            <defs>
              <linearGradient id="brandGrad" x1="0" y1="0" x2="36" y2="36">
                <stop offset="0%" stop-color="#7e22ce"/>
                <stop offset="100%" stop-color="#a855f7"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1 class="brand-name">ORAI</h1>
          <p class="brand-sub">Insight Hub</p>
        </div>
      </div>

      <div class="login-card">
        <div class="login-card-header">
          <h2>Welcome to ORAI Insight Hub</h2>
          <p>Sign in to access your department dashboard</p>
        </div>

        <form id="login-form" class="login-form">
          <div class="form-group">
            <label for="login-username">Username</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username" />
            </div>
          </div>

          <div class="form-group">
            <label for="login-department">Department</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
              <select id="login-department" required>
                <option value="" disabled selected>Select your department</option>
                <option value="CS Team">CS Team</option>
                <option value="Implementation Team">Implementation Team</option>
                <option value="Dev Team">Dev Team</option>
                <option value="Sales Team">Sales Team</option>
              </select>
            </div>
          </div>


          <div class="form-group">
            <label for="login-password">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password" />
              <button type="button" class="toggle-password" onclick="togglePassword()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div id="login-error" class="form-error hidden"></div>

          <button type="submit" class="btn-login" id="login-btn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader hidden">
              <svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            </span>
          </button>
        </form>

        <form id="otp-form" class="login-form hidden">
          <div style="text-align: center; margin-bottom: 10px;">
            <p style="color: var(--text-secondary); font-size: 0.9rem;" id="otp-message">Enter the 6-digit code sent to your email.</p>
          </div>
          <div class="form-group">
            <label for="login-otp">Verification Code</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="text" id="login-otp" placeholder="Enter OTP" required pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" style="letter-spacing: 4px; font-weight: 700; text-align: center; padding-left: 14px;" />
            </div>
          </div>
          
          <div id="otp-error" class="form-error hidden"></div>

          <button type="submit" class="btn-login" id="verify-btn">
            <span class="btn-text">Verify & Login</span>
            <span class="btn-loader hidden">
              <svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            </span>
          </button>
          
          <button type="button" class="btn btn-ghost" style="width: 100%; justify-content: center; margin-top: 10px;" onclick="cancelOTP()">
            Back to Login
          </button>
        </form>



        <div class="login-demo" id="login-demo-text">
          <p>Demo credentials: <strong>admin</strong> / <strong>admin123</strong></p>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════ DASHBOARD -->
  <div id="dashboard-page" class="page hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="brand-icon-sm">
            <svg width="24" height="24" viewBox="0 0 36 36" fill="none">
              <rect width="36" height="36" rx="10" fill="url(#brandGrad2)"/>
              <path d="M10 18L16 12L22 18L28 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10 24L16 18L22 24L28 18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
              <defs>
                <linearGradient id="brandGrad2" x1="0" y1="0" x2="36" y2="36">
                  <stop offset="0%" stop-color="#7e22ce"/>
                  <stop offset="100%" stop-color="#a855f7"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <span class="sidebar-brand-name">ORAI Hub</span>
        </div>
        <button class="sidebar-toggle" onclick="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>

      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-username">Loading...</div>
          <div class="dept-badge" id="sidebar-dept">--</div>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Dynamically populated based on department -->
      </nav>

      <div class="sidebar-footer">
        <button class="btn-logout" onclick="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Sign Out</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-menu-btn" onclick="toggleSidebar()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="topbar-breadcrumb">
            <span id="page-title">Dashboard</span>
          </div>
        </div>
        <div class="topbar-right">
          <button id="voice-search-btn" class="btn-icon" title="Voice Search" style="color: var(--text-muted);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line><line x1="8" y1="22" x2="16" y2="22"></line></svg>
          </button>
          <div class="theme-switcher">
            <button class="btn-icon" onclick="toggleThemeMenu(event)" title="Change Theme" style="color: var(--text-muted);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3V4M12 20V21M4 12H3M21 12H20M18.36 5.64L17.66 6.34M6.34 17.66L5.64 18.36M18.36 18.36L17.66 17.66M6.34 6.34L5.64 5.64M12 8C9.79 8 8 9.79 8 12C8 14.21 9.79 16 12 16C14.21 16 16 14.21 16 12C16 9.79 14.21 8 12 8Z"/></svg>
            </button>
            <div id="theme-menu" class="theme-menu hidden">
              <div class="theme-option" onclick="setTheme('dark')">
                <div class="theme-preview dark"></div>
                <span>Dark Mode</span>
              </div>
              <div class="theme-option" onclick="setTheme('light')">
                <div class="theme-preview light"></div>
                <span>Light Mode</span>
              </div>
              <div class="theme-option" onclick="setTheme('white')">
                <div class="theme-preview white"></div>
                <span>Pure White</span>
              </div>
            </div>
          </div>
          <div class="topbar-dept" id="topbar-dept-badge">--</div>
          <div class="topbar-time" id="topbar-time"></div>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content-area" id="content-area">
        <!-- Dynamically rendered -->
      </div>
    </main>
  </div>

  <!-- ═════════════════════════════════════════════════════════════ MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Modal Title</h3>
        <button class="modal-close" onclick="closeModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- 1. Icons & Core API (Dependencies) -->
  <script src="/js/icons.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ai-agent-widget.js"></script>

  <!-- 2. UI Modules (Page Rendering Functions) -->
  <script src="/js/dashboard.js"></script>
  <script src="/js/meetings.js"></script>
  <script src="/js/bots.js"></script>
  <script src="/js/clients.js"></script>
  <script src="/js/upsell.js"></script>
  <script src="js/profile.js"></script>
  <script src="/js/requirements.js"></script>
  <script src="/js/whatsapp.js"></script>
  <script src="/js/healthchecks.js"></script>
  <script src="/js/tickets.js"></script>
  <script src="/js/finance.js"></script>
  <script src="/js/admin.js"></script>

  <!-- 3. Layout & App Core (Execution) -->
  <script src="/layouts/shared/sidebar.js"></script>
  <script src="/layouts/LayoutManager.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
